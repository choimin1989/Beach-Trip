<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beach Trip Survey</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #efede8;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #9e9c96;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-tertiary: #242422;
      --text-primary: #f0ede8;
      --text-secondary: #a8a69f;
      --text-tertiary: #6b6966;
      --border-tertiary: rgba(255,255,255,0.1);
      --border-secondary: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page { max-width: 680px; margin: 0 auto; }

  .hero { text-align: center; margin-bottom: 2rem; }
  .hero svg { display: block; margin: 0 auto 8px; }
  .hero h1 { font-size: 24px; font-weight: 600; color: var(--text-primary); }
  .hero p { font-size: 15px; color: var(--text-secondary); margin-top: 5px; }

  .form-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .field-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }

  .name-input {
    width: 100%; padding: 10px 13px;
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    font-size: 15px; font-family: var(--font);
    background: var(--bg-primary); color: var(--text-primary);
    outline: none; transition: border-color .15s;
  }
  .name-input:focus { border-color: #378ADD; }

  .divider { height: 0.5px; background: var(--border-tertiary); margin: 1.25rem 0; }

  .step-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .step-dot {
    width: 26px; height: 26px; border-radius: 50%;
    background: #185FA5; color: #fff;
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-label { font-size: 15px; font-weight: 500; color: var(--text-primary); }

  .month-label {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text-secondary);
    margin: 1rem 0 8px;
  }

  .wgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }

  .wcard {
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-md);
    padding: 10px 12px; cursor: pointer;
    background: var(--bg-primary);
    transition: border-color .12s, background .12s;
    user-select: none;
    display: flex; justify-content: space-between; align-items: center;
  }
  .wcard:hover { border-color: var(--border-secondary); }
  .wcard .wd { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .wcard .wtick {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border-secondary); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
  }

  /* Selection States */
  .wcard.selected { background: #E6F1FB; border-color: #378ADD; }
  .wcard.selected .wd { color: #185FA5; }
  .wcard.selected .wtick { background: #185FA5; border-color: #185FA5; color: white; }

  .stay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stay-opt {
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-md);
    padding: 13px 14px; cursor: pointer;
    background: var(--bg-primary);
    transition: border-color .12s, background .12s;
    user-select: none;
  }
  .stay-opt:hover { border-color: var(--border-secondary); }
  .stay-opt.chosen { background: #E6F1FB; border-color: #378ADD; }
  .stay-opt .stay-letter { font-size: 11px; font-weight: 600; color: #378ADD; margin-bottom: 3px; }
  .stay-opt.chosen .stay-letter { color: #185FA5; }
  .stay-opt .stay-days { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .stay-opt.chosen .stay-days { color: #0C447C; }
  .stay-opt .stay-vibe { font-size: 12px; color: var(--text-tertiary); line-height: 1.4; }
  .stay-opt.chosen .stay-vibe { color: #185FA5; }

  .submit-btn {
    width: 100%; padding: 12px;
    background: #185FA5; color: #fff;
    border: none; border-radius: var(--radius-md);
    font-size: 15px; font-weight: 600; font-family: var(--font);
    cursor: pointer; margin-top: 1.25rem; transition: background .15s;
  }
  .submit-btn:hover { background: #0C447C; }

  .results-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
  }

  .results-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 1.25rem; }

  .tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--border-tertiary); margin-bottom: 1.25rem; }
  .tab {
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    padding: 6px 16px 9px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .15s, border-color .15s;
  }
  .tab.active { color: #185FA5; border-bottom-color: #185FA5; }

  .r-section { display: none; } .r-section.visible { display: block; }

  .hmap-month {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text-secondary);
    margin: 1rem 0 8px;
  }
  .hgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .hcell { border-radius: var(--radius-md); padding: 10px 12px; border: 0.5px solid transparent; display: flex; flex-direction: column; gap: 3px; }
  .hcell .hd { font-size: 13px; font-weight: 500; }
  .hcell .hn { font-size: 11px; line-height: 1.4; }
  .hcell .hc { font-size: 11px; font-weight: 600; margin-top: 2px; }

  /* Heatmap Shades */
  .hc0 { background: var(--bg-secondary); border-color: var(--border-tertiary); }
  .hc1 { background: #E6F1FB; border-color: #85B7EB; color: #185FA5; }
  .hc2 { background: #B5D4F4; border-color: #378ADD; color: #0C447C; }
  .hc3 { background: #378ADD; border-color: #185FA5; color: #fff; }
  .hc4 { background: #185FA5; border-color: #0C447C; color: #fff; }
  .hc5 { background: #0C447C; border-color: #042C53; color: #E6F1FB; }

  .stay-bars { display: flex; flex-direction: column; gap: 10px; }
  .sbar-row { display: flex; align-items: center; gap: 10px; }
  .sbar-label { font-size: 13px; color: var(--text-secondary); min-width: 90px; flex-shrink: 0; }
  .sbar-track { flex: 1; height: 30px; background: var(--bg-secondary); border-radius: 6px; overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 6px; background: #378ADD; display: flex; align-items: center; padding-left: 10px; transition: width .4s; }
  .sbar-fill-text { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }

  .winner {
    display: inline-flex; align-items: center; gap: 6px;
    background: #EAF3DE; color: #3B6D11;
    border-radius: 20px; padding: 5px 14px;
    font-size: 13px; font-weight: 500; margin-bottom: 1rem;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--bg-secondary); border: 0.5px solid var(--border-tertiary);
    border-radius: 20px; padding: 5px 10px;
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .chip button { background: none; border: none; cursor: pointer; color: var(--text-tertiary); }

  @media (max-width: 480px) {
    .stay-grid { grid-template-columns: 1fr; }
    .wgrid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <h1>Beach trip survey</h1>
    <p>Two quick questions — results update live.</p>
  </div>

  <div class="form-card">
    <div class="field-label">Your name</div>
    <input class="name-input" type="text" id="nameInput" placeholder="Enter your name…" />

    <div class="divider"></div>

    <div class="step-row">
      <div class="step-dot">1</div>
      <div class="step-label">Which weekends work for you?</div>
    </div>

    <div class="month-label">July 2025</div>
    <div id="julyGrid" class="wgrid"></div>
    <div class="month-label">August 2025</div>
    <div id="augustGrid" class="wgrid"></div>

    <div class="divider"></div>

    <div class="step-row">
      <div class="step-dot">2</div>
      <div class="step-label">How many days?</div>
    </div>

    <div class="stay-grid">
      <div class="stay-opt" data-val="fri-sun" onclick="pickStay(this)">
        <div class="stay-letter">A</div>
        <div class="stay-days">Fri – Sun</div>
        <div class="stay-vibe">Quick weekend</div>
      </div>
      <div class="stay-opt" data-val="fri-mon" onclick="pickStay(this)">
        <div class="stay-letter">B</div>
        <div class="stay-days">Fri – Mon</div>
        <div class="stay-vibe">Longer escape</div>
      </div>
      <div class="stay-opt" data-val="thu-sun" onclick="pickStay(this)">
        <div class="stay-letter">C</div>
        <div class="stay-days">Thu – Sun</div>
        <div class="stay-vibe">Early start</div>
      </div>
      <div class="stay-opt" data-val="thu-mon" onclick="pickStay(this)">
        <div class="stay-letter">D</div>
        <div class="stay-days">Thu – Mon</div>
        <div class="stay-vibe">The full experience</div>
      </div>
    </div>

    <button class="submit-btn" onclick="submitEntry()">Submit my answers</button>
  </div>

  <div class="results-card">
    <div class="results-title">Live results</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab(1)">Weekend overlap</div>
      <div class="tab" onclick="switchTab(2)">Stay length</div>
    </div>
    <div id="sec1" class="r-section visible">
      <div id="winnerBadge"></div>
      <div id="julyHmap" class="hgrid"></div>
      <div id="augustHmap" class="hgrid"></div>
    </div>
    <div id="sec2" class="r-section">
      <div id="stayBars" class="stay-bars"></div>
    </div>
    <div class="chips" id="chips" style="margin-top:20px;"></div>
  </div>
</div>

<script>
const WEEKENDS = [
  {id:0, dates:"Jul 4–6",   month:"july"},
  {id:1, dates:"Jul 11–13", month:"july"},
  {id:2, dates:"Jul 18–20", month:"july"},
  {id:3, dates:"Jul 25–27", month:"july"},
  {id:4, dates:"Aug 1–3",   month:"august"},
  {id:5, dates:"Aug 8–10",  month:"august"},
  {id:6, dates:"Aug 15–17", month:"august"},
  {id:7, dates:"Aug 22–24", month:"august"},
  {id:8, dates:"Aug 29–31", month:"august"},
];

let selectedWeekends = new Set();
let selectedStay = null;
let entries = [];

function pickStay(el) {
  document.querySelectorAll('.stay-opt').forEach(o => o.classList.remove('chosen'));
  el.classList.add('chosen');
  selectedStay = el.dataset.val;
}

function switchTab(n) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i+1 === n));
  document.getElementById('sec1').classList.toggle('visible', n === 1);
  document.getElementById('sec2').classList.toggle('visible', n === 2);
}

function getWkCounts() {
  const counts = {};
  WEEKENDS.forEach(w => counts[w.id] = 0);
  entries.forEach(e => e.weekends.forEach(id => counts[id]++));
  return counts;
}

function renderGrids() {
  const counts = getWkCounts();
  const max = Math.max(...Object.values(counts), 1);

  ["julyGrid", "augustGrid"].forEach(gid => {
    const month = gid === "julyGrid" ? "july" : "august";
    const grid = document.getElementById(gid);
    grid.innerHTML = "";
    WEEKENDS.filter(w => w.month === month).forEach(w => {
      const isSel = selectedWeekends.has(w.id);
      const card = document.createElement("div");
      card.className = `wcard ${isSel ? 'selected' : ''}`;
      card.innerHTML = `<span class="wd">${w.dates}</span><span class="wtick">${isSel ? '✓' : ''}</span>`;
      card.onclick = (e) => {
        e.preventDefault();
        if (selectedWeekends.has(w.id)) selectedWeekends.delete(w.id);
        else selectedWeekends.add(w.id);
        renderGrids();
      };
      grid.appendChild(card);
    });
  });
}

function renderResults() {
  const counts = getWkCounts();
  const max = Math.max(...Object.values(counts), 1);
  
  // Heatmap
  ["julyHmap", "augustHmap"].forEach(gid => {
    const month = gid === "julyHmap" ? "july" : "august";
    const grid = document.getElementById(gid);
    grid.innerHTML = "";
    WEEKENDS.filter(w => w.month === month).forEach(w => {
      const c = counts[w.id];
      const cell = document.createElement("div");
      const level = c === 0 ? 0 : Math.ceil((c/max)*5);
      cell.className = `hcell hc${level}`;
      cell.innerHTML = `<span class="hd">${w.dates}</span><span class="hc">${c} votes</span>`;
      grid.appendChild(cell);
    });
  });

  // Stay bars
  const stayCounts = { 'fri-sun':0, 'fri-mon':0, 'thu-sun':0, 'thu-mon':0 };
  entries.forEach(e => { if(e.stay) stayCounts[e.stay]++ });
  const sMax = Math.max(...Object.values(stayCounts), 1);
  document.getElementById("stayBars").innerHTML = Object.entries(stayCounts).map(([k, v]) => `
    <div class="sbar-row">
      <div class="sbar-label">${k.replace('-', '–')}</div>
      <div class="sbar-track"><div class="sbar-fill" style="width:${(v/sMax)*100}%"><span class="sbar-fill-text">${v}</span></div></div>
    </div>
  `).join("");
}

function submitEntry() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name || selectedWeekends.size === 0 || !selectedStay) return alert("Fill all fields!");
  entries.push({ name, weekends: [...selectedWeekends], stay: selectedStay });
  selectedWeekends.clear();
  selectedStay = null;
  document.getElementById("nameInput").value = "";
  document.querySelectorAll('.stay-opt').forEach(o => o.classList.remove('chosen'));
  renderGrids();
  renderResults();
}

renderGrids();
renderResults();
</script>
</body>
</html>
